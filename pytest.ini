[pytest]
# Configuración de pytest para el proyecto

# Directorio de tests
testpaths = tests

# Patrones de archivos de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones por defecto
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers personalizados
markers =
    unit: Pruebas unitarias
    property: Pruebas basadas en propiedades
    integration: Pruebas de integración
    slow: Pruebas que toman tiempo
    aws: Pruebas que requieren servicios AWS

# Configuración de asyncio
asyncio_mode = auto

# Configuración de Hypothesis
hypothesis_profile = ci
